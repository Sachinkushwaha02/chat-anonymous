<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Chat Room</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; }
        .card { background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); }
        .hidden { display: none; }
        .btn { padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .chat-container { display: flex; gap: 1rem; height: 500px; }
        .chat-main { flex: 1; display: flex; flex-direction: column; }
        .chat-sidebar { width: 200px; background: #f9f9f9; border-radius: 8px; padding: 1rem; }
        .messages { flex: 1; overflow-y: auto; padding: 1rem; background: #f9f9f9; border-radius: 8px; margin-bottom: 1rem; }
        .message { margin-bottom: 1rem; display: flex; flex-direction: column; }
        .message.own { align-items: flex-end; }
        .message-text { background: white; padding: 10px 14px; border-radius: 12px; max-width: 80%; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .message.own .message-text { background: #667eea; color: white; }
        .message-input-area { display: flex; gap: 8px; align-items: center; }
        
        /* Mic Styles */
        #micBtn { background: #ff4757; font-size: 18px; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; transition: 0.3s; }
        #micBtn.recording { animation: pulse-red 1.5s infinite; background: #ff0000; }
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        audio { margin-top: 5px; max-width: 100%; }
        .system-message { text-align: center; font-size: 11px; color: #aaa; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginPage" class="card">
            <h1>Join Chat</h1>
            <input type="text" id="username" placeholder="Your Name" style="width:100%; padding:10px; margin:10px 0;">
            <input type="text" id="roomCode" placeholder="Room Code" style="width:100%; padding:10px; margin:10px 0;">
            <button class="btn" style="width:100%" onclick="join()">Join Room</button>
        </div>

        <div id="chatPage" class="card hidden">
            <div class="chat-container">
                <div class="chat-main">
                    <div class="messages" id="messages"></div>
                    <div id="recordingStatus" style="color:red; display:none; font-size:12px;">🔴 Recording...</div>
                    <div class="message-input-area">
                        <input type="text" id="messageInput" style="flex:1; padding:12px;" placeholder="Type here...">
                        <button id="micBtn">🎤</button>
                        <button class="btn" onclick="sendMessage()">Send</button>
                    </div>
                </div>
                <div class="chat-sidebar">
                    Online (<span id="userCount">0</span>)
                    <ul id="usersList" style="list-style:none; font-size:12px;"></ul>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser, currentRoom, mediaRecorder, audioChunks = [];
        const messagesDiv = document.getElementById('messages');

        function join() {
            currentUser = document.getElementById('username').value;
            currentRoom = document.getElementById('roomCode').value.toUpperCase();
            if(currentUser && currentRoom) {
                socket.emit('join-room', { username: currentUser, roomCode: currentRoom });
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('chatPage').classList.remove('hidden');
            }
        }

        function sendMessage() {
            const text = document.getElementById('messageInput').value;
            if(!text) return;
            appendMsg({ user: 'You', text, isOwn: true });
            socket.emit('send-message', { roomCode: currentRoom, user: currentUser, text });
            document.getElementById('messageInput').value = '';
        }

        // --- VOICE LOGIC ---
        const micBtn = document.getElementById('micBtn');
        micBtn.onmousedown = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    const base64 = reader.result;
                    appendVoice({ user: 'You', audioData: base64, isOwn: true });
                    socket.emit('send-voice', { roomCode: currentRoom, user: currentUser, audioData: base64 });
                };
            };
            mediaRecorder.start();
            micBtn.classList.add('recording');
            document.getElementById('recordingStatus').style.display='block';
        };
        micBtn.onmouseup = () => {
            if(mediaRecorder) mediaRecorder.stop();
            micBtn.classList.remove('recording');
            document.getElementById('recordingStatus').style.display='none';
        };

        socket.on('receive-message', data => appendMsg({ ...data, isOwn: false }));
        socket.on('receive-voice', data => appendVoice({ ...data, isOwn: false }));
        socket.on('system-message', text => {
            const div = document.createElement('div'); div.className='system-message'; div.innerText=text;
            messagesDiv.appendChild(div);
        });
        socket.on('update-users', users => {
            document.getElementById('userCount').innerText = users.length;
            document.getElementById('usersList').innerHTML = users.map(u => `<li>${u}</li>`).join('');
        });
        socket.on('load-messages', history => {
            messagesDiv.innerHTML = '';
            history.forEach(m => appendMsg({ user: m.user, text: m.text, isOwn: m.user === currentUser }));
        });

        function appendMsg(data) {
            const div = document.createElement('div');
            div.className = `message ${data.isOwn ? 'own' : ''}`;
            div.innerHTML = `<div style="font-size:10px; color:#667eea">${data.user}</div><div class="message-text">${data.text}</div>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function appendVoice(data) {
            const div = document.createElement('div');
            div.className = `message ${data.isOwn ? 'own' : ''}`;
            div.innerHTML = `<div style="font-size:10px; color:#667eea">${data.user}</div><div class="message-text"><audio src="${data.audioData}" controls></audio></div>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>
</html>
